name: Chore Template
description: 설정, 빌드, 의존성, 환경 정리 등 기타 작업용 템플릿
title: "[Chore] "
labels: ["chore"]

body:
  - type: dropdown
    id: category
    attributes:
      label: "✔️ 작업 종류"
      description: "어떤 종류의 작업인지 선택해주세요."
      options:
        - 기타
        - 의존성 업데이트
        - 빌드 설정 변경
        - CI/CD 수정
        - 환경설정 수정
        - 패키지 정리
        - 프로젝트 구조 정리
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: "📝 어떤 작업인가요?"
      description: "작업 내용을 간단히 적어주세요."
      placeholder: "ex. GitHub Actions 배포 워크플로 수정"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📌 작업 상세 내용"
      description: "구체적인 작업 내용을 작성해주세요."
      placeholder: |
        ex.
        - 배포 환경 변수 주입 방식 수정
        - 불필요한 job 제거
        - 캐시 전략 변경
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "👀 참고 사항"
      description: "관련 배경이나 참고할 내용을 작성해주세요."
      placeholder: "ex. dev 환경에서만 우선 적용"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "작업 완료 기준을 작성해주세요."
      placeholder: |
        ex.
        - [ ] 워크플로가 정상 실행된다
        - [ ] 기존 기능에 영향이 없다
    validations:
      required: false