name: Refactor Template
description: 리팩토링 작업 시 사용하는 이슈 템플릿
title: "[Refactor] "
labels: ["refactor"]

body:
  - type: input
    id: target
    attributes:
      label: "📝 어떤 부분을 리팩토링하나요?"
      description: "리팩토링 대상을 간단히 적어주세요."
      placeholder: "ex. 게시글 조회 서비스 메서드 리팩토링"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "📍 리팩토링 이유"
      description: "왜 리팩토링이 필요한지 작성해주세요."
      placeholder: |
        ex.
        - 메서드가 너무 길어 가독성이 떨어짐
        - 중복 코드가 많아 유지보수가 어려움
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "🛠 작업 내용"
      description: "구체적인 변경 내용을 작성해주세요."
      placeholder: |
        ex.
        - private 메서드로 분리
        - 변수명 정리
        - 중복 로직 공통화
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "어떤 상태가 되면 완료인지 작성해주세요."
      placeholder: |
        ex.
        - [ ] 기능 동작은 기존과 동일하다
        - [ ] 테스트가 모두 통과한다
        - [ ] 가독성이 개선되었다
    validations:
      required: false