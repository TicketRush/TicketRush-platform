name: Test Template
description: 테스트 코드 추가 또는 수정 시 사용하는 이슈 템플릿
title: "[모듈명] "
labels: ["test"]

body:
  - type: input
    id: summary
    attributes:
      label: "📝 어떤 테스트를 추가/수정하나요?"
      description: "작업할 테스트를 간단히 적어주세요."
      placeholder: "ex. 게시글 조회 서비스 단위 테스트 작성"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📌 작업 상세 내용"
      description: "구체적인 테스트 작업 내용을 작성해주세요."
      placeholder: |
        ex.
        - 정상 조회 케이스 테스트 추가
        - 예외 케이스 테스트 추가
        - Mock 설정 정리
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "👀 참고 사항"
      description: "테스트 범위나 제약사항이 있으면 작성해주세요."
      placeholder: "ex. 외부 API는 mock 처리"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "테스트 작업 완료 기준을 작성해주세요."
      placeholder: |
        ex.
        - [ ] 주요 시나리오 테스트가 추가된다
        - [ ] 테스트가 모두 통과한다
    validations:
      required: false