name: Feature Template
description: 기능 추가 시 사용하는 이슈 템플릿
title: "[Feat] "
labels: ["feature"]

body:
  - type: input
    id: summary
    attributes:
      label: "📝 어떤 기능을 추가하나요?"
      description: "추가할 기능을 한 줄로 설명해주세요."
      placeholder: "ex. 게시글 조회 API 구현"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📌 작업할 내용"
      description: "구체적인 작업 내용을 작성해주세요."
      placeholder: |
        ex.
        - 게시글 단건 조회 API 구현
        - 예외 처리 추가
        - 응답 DTO 작성
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "👀 추가 설명"
      description: "필요하면 자세한 배경이나 참고 내용을 적어주세요."
      placeholder: "ex. 커서 기반 페이지네이션은 다음 이슈에서 분리 예정"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "어떤 상태가 되면 이 이슈가 완료인지 작성해주세요."
      placeholder: |
        ex.
        - [ ] 게시글 조회 API가 동작한다
        - [ ] 예외 케이스 테스트를 통과한다
        - [ ] Swagger 문서가 반영된다
    validations:
      required: false