name: Infra Template
description: 서버 환경 세팅, Docker, K8s, CI/CD 파이프라인 등 인프라 작업용 템플릿
title: "[인프라명] "
labels: ["infra"]

body:
  - type: input
    id: summary
    attributes:
      label: "📝 어떤 인프라 작업인가요?"
      description: "작업 내용을 간단히 적어주세요."
      placeholder: "ex. 재고 모듈 K8s Deployment 설정"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📌 작업 상세 내용"
      description: "구체적인 작업 내용이나 아키텍처 변경 사항을 작성해주세요."
      placeholder: |
        ex.
        - Dockerfile 작성 및 이미지 최적화
        - K8s Service, Ingress 라우팅 설정
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "👀 참고 사항"
      description: "관련 환경 변수, 보안 스크립트, 참고 레퍼런스 등을 작성해주세요."
      placeholder: "ex. Secret 파일은 Vault를 통해 주입 예정"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "인프라 구축 완료 기준을 작성해주세요."
      placeholder: |
        ex.
        - [ ] K8s 클러스터 내에서 파드가 정상적으로 Running 상태가 된다.
        - [ ] 외부 통신(Ingress)이 정상 라우팅된다.
    validations:
      required: false