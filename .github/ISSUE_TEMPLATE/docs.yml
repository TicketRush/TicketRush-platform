name: Docs Template
description: 문서 작성 또는 수정 시 사용하는 이슈 템플릿
title: "[모듈명] "
labels: ["docs"]

body:
  - type: input
    id: summary
    attributes:
      label: "📝 어떤 문서를 작업하나요?"
      description: "문서 작업 내용을 간단히 적어주세요."
      placeholder: "ex. README 실행 방법 수정"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📌 작업 상세 내용"
      description: "수정 또는 추가할 문서 내용을 작성해주세요."
      placeholder: |
        ex.
        - 실행 방법 최신화
        - 환경 변수 설명 추가
        - 예시 명령어 보완
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "👀 참고 사항"
      description: "관련 링크나 참고할 자료가 있으면 적어주세요."
      placeholder: "ex. 기존 README의 배포 파트 참고"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "문서 작업 완료 기준을 작성해주세요."
      placeholder: |
        ex.
        - [ ] 문서 내용이 최신 상태로 반영된다
        - [ ] 팀원이 보고 이해할 수 있다
    validations:
      required: false