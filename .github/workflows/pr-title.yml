name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-title:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title format
        shell: bash
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          REGEX='^\[(FEAT|FIX|REFACTOR|DOCS|TEST|CHORE)\] #[0-9]+ .+$'

          if [[ ! "$TITLE" =~ $REGEX ]]; then
            echo "PR 제목 형식이 올바르지 않습니다."
            echo "허용 형식: [FEAT] #23 로그인 API 구현"
            echo "허용 TYPE: FEAT, FIX, REFACTOR, DOCS, TEST, CHORE"
            exit 1
          fi

          echo "PR 제목 형식이 올바릅니다."