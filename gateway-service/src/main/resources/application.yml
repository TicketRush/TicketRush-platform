server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://${services.user.host}:8081
              predicates:
                - Path=/api/v1/user/**
              filters:
                - StripPrefix=1

            - id: auth-service
              uri: http://${services.auth.host}:8082
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=1

            - id: performance-service
              uri: http://${services.performance.host}:8083
              predicates:
                - Path=/api/v1/performance/**
              filters:
                - StripPrefix=1

            - id: booking-service
              uri: http://${services.booking.host}:8084
              predicates:
                - Path=/api/v1/booking/**
              filters:
                - StripPrefix=1

            - id: payment-service
              uri: http://${services.payment.host}:8085
              predicates:
                - Path=/api/v1/payment/**
              filters:
                - StripPrefix=1

            - id: seat-service
              uri: http://${services.seat.host}:8086
              predicates:
                - Path=/api/v1/seat/**
              filters:
                - StripPrefix=1

            - id: ticket-service
              uri: http://${services.ticket.host}:8087
              predicates:
                - Path=/api/v1/ticket/**
              filters:
                - StripPrefix=1

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 각 서비스의 API docs를 Gateway에서 통합
springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /v3/api-docs/user
      - name: auth-service
        url: /v3/api-docs/auth
      - name: performance-service
        url: /v3/api-docs/performance
      - name: booking-service
        url: /v3/api-docs/booking
      - name: payment-service
        url: /v3/api-docs/payment
      - name: seat-service
        url: /v3/api-docs/seat
      - name: ticket-service
        url: /v3/api-docs/ticket
